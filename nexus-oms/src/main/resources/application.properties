spring.application.name=nexus-oms

# Disable Spring Boot Docker Compose integration so it doesn't start the Docker container
spring.docker.compose.enabled=false

# Connect to your existing local PostgreSQL installation
spring.datasource.url=jdbc:postgresql://localhost:5432/oms
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# Automatically create or update the database tables based on the entity classes
spring.jpa.hibernate.ddl-auto=update
# Show SQL queries in the console for debugging
spring.jpa.show-sql=true
